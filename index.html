<!DOCTYPE html>
<html>
<head>
    <title>Ancient Warrior Adventure</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            
            // 1. الإضاءة والجو (سماء وعالم مفتوح)
            scene.clearColor = new BABYLON.Color3(0.4, 0.6, 0.9);
            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.7;

            // 2. كاميرا تتبع ذكية
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 10, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);
            camera.lowerRadiusLimit = 5;
            camera.upperRadiusLimit = 20;

            // 3. الأرضية والأشجار (عالم مفتوح)
            const ground = BABYLON.MeshBuilder.CreateGroundFromHeightMap("gd", "https://assets.babylonjs.com/textures/heightMap.png", {
                width: 100, height: 100, subdivisions: 50, minHeight: 0, maxHeight: 5
            }, scene);
            const groundMat = new BABYLON.StandardMaterial("gMat", scene);
            groundMat.diffuseTexture = new BABYLON.Texture("https://assets.babylonjs.com/textures/grass.jpg", scene);
            ground.material = groundMat;

            // إضافة أشجار بشكل عشوائي
            const treeAsset = await BABYLON.SceneLoader.ImportMeshAsync("", "https://assets.babylonjs.com/meshes/", "Tree.glb", scene);
            const baseTree = treeAsset.meshes[0];
            baseTree.isVisible = false; // نخفي الأصل ونوزع نسخ

            for (let i = 0; i < 30; i++) {
                const treeClone = baseTree.clone("tree" + i);
                treeClone.position = new BABYLON.Vector3(Math.random() * 80 - 40, 0, Math.random() * 80 - 40);
                treeClone.position.y = ground.getHeightAtCoordinates(treeClone.position.x, treeClone.position.z);
                treeClone.isVisible = true;
            }

            // 4. تحميل المحارب (Knight)
            // ملاحظة: نستخدم موديل مدمج متاح للـ Babylonjs
            const result = await BABYLON.SceneLoader.ImportMeshAsync("", "https://assets.babylonjs.com/meshes/", "Knight.glb", scene);
            const warrior = result.meshes[0];
            warrior.scaling.setAll(0.05);
            camera.lockedTarget = warrior;

            // 5. دعم الموبايل (Virtual Joystick)
            const leftJoystick = new BABYLON.VirtualJoystick(true); // لليسار (الحركة)
            const rightJoystick = new BABYLON.VirtualJoystick(false); // لليمين (النظر/الأكشن)
            BABYLON.VirtualJoystick.Canvas.style.zIndex = "100";

            // 6. نظام الحركة المزدوج (كيبورد + موبايل)
            const inputMap = {};
            window.addEventListener("keydown", (evt) => { inputMap[evt.key.toLowerCase()] = true; });
            window.addEventListener("keyup", (evt) => { inputMap[evt.key.toLowerCase()] = false; });

            scene.onBeforeRenderObservable.add(() => {
                let speed = 0.15;
                let moveVector = BABYLON.Vector3.Zero();

                // تحكم الموبايل
                if (leftJoystick.pressed) {
                    moveVector.x = leftJoystick.deltaPosition.x * speed;
                    moveVector.z = leftJoystick.deltaPosition.y * speed;
                }
                
                // تحكم الكيبورد (كبديل)
                if (inputMap["w"]) moveVector.z = speed;
                if (inputMap["s"]) moveVector.z = -speed;
                if (inputMap["a"]) moveVector.x = -speed;
                if (inputMap["d"]) moveVector.x = speed;

                if (!moveVector.equals(BABYLON.Vector3.Zero())) {
                    warrior.moveWithCollisions(moveVector);
                    // تدوير الشخصية باتجاه الحركة
                    const targetAngle = Math.atan2(moveVector.x, moveVector.z);
                    warrior.rotation.y = BABYLON.Scalar.LerpAngle(warrior.rotation.y, targetAngle, 0.1);
                }
                
                // التأكد من بقاء المحارب فوق الأرض المتموجة
                warrior.position.y = ground.getHeightAtCoordinates(warrior.position.x, warrior.position.z);
            });

            return scene;
        };

        createScene().then(scene => {
            engine.runRenderLoop(() => { scene.render(); });
        });

        window.addEventListener("resize", () => { engine.resize(); });
    </script>
</body>
</html>
