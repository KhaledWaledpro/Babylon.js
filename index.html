<!DOCTYPE html>
<html>
<head>
    <title>Babylon.js Quick Start</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            
            // خلفية زرقاء عشان تتأكد إن المشهد شغال
            scene.clearColor = new BABYLON.Color3(0.5, 0.8, 1);

            // إضاءة قوية
            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.8;

            // الكاميرا
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 3, 15, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);

            // أرضية كبيرة وواضحة
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 100, height: 100}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.1, 0.4, 0.1); 
            ground.material = groundMat;

            // إنشاء لاعب مؤقت (صندوق) في حالة الموديل مجاش
            let player = BABYLON.MeshBuilder.CreateBox("player", {size: 2}, scene);
            player.position.y = 1; // يرفعه فوق الأرض
            const playerMat = new BABYLON.StandardMaterial("playerMat", scene);
            playerMat.diffuseColor = new BABYLON.Color3(1, 0, 0); // لون أحمر
            player.material = playerMat;

            camera.lockedTarget = player;

            // محاولة تحميل الموديل الجاهز (لو فشل هيكمل بالصندوق)
            BABYLON.SceneLoader.ImportMeshAsync("", "https://assets.babylonjs.com/meshes/", "HVGirl.glb", scene).then((result) => {
                const mesh = result.meshes[0];
                mesh.scaling.setAll(0.1);
                mesh.parent = player; // نربط الموديل بالصندوق
                player.isVisible = false; // نخفي الصندوق ونظهر البنت
            }).catch(err => console.log("الموديل لسه بيحمل أو فيه مشكلة في النت"));

            // نظام الحركة
            const inputMap = {};
            window.addEventListener("keydown", (evt) => { inputMap[evt.key.toLowerCase()] = true; });
            window.addEventListener("keyup", (evt) => { inputMap[evt.key.toLowerCase()] = false; });

            scene.onBeforeRenderObservable.add(() => {
                const speed = 0.2;
                if (inputMap["w"]) player.moveWithCollisions(player.forward.scaleInPlace(speed));
                if (inputMap["s"]) player.moveWithCollisions(player.forward.scaleInPlace(-speed));
                if (inputMap["a"]) player.rotate(BABYLON.Vector3.Up(), -0.05);
                if (inputMap["d"]) player.rotate(BABYLON.Vector3.Up(), 0.05);
            });

            return scene;
        };

        createScene().then(scene => {
            engine.runRenderLoop(() => { scene.render(); });
        });

        window.addEventListener("resize", () => { engine.resize(); });
    </script>
</body>
</html>
