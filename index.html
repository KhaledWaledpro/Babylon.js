<!DOCTYPE html>
<html>
<head>
    <title>Babylon.js Adventure Game</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);

            // 1. إضاءة أساسية
            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.7;

            // 2. كاميرا تتبع اللاعب (ArcRotateCamera)
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 10, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);

            // 3. إنشاء أرضية للمغامرة
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 50, height: 50}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.2, 0.5, 0.2); // لون عشبي
            ground.material = groundMat;

            // 4. تحميل شخصية جاهزة (Dummy3D)
            // نستخدم Asset جاهز من مستودع Babylon
            const result = await BABYLON.SceneLoader.ImportMeshAsync("", "https://assets.babylonjs.com/meshes/", "HVGirl.glb", scene);
            const player = result.meshes[0];
            player.scaling.setAll(0.1); // تصغير حجم الشخصية
            
            // جعل الكاميرا تتبع اللاعب
            camera.lockedTarget = player;

            // 5. نظام الحركة (Keyboard Control)
            const inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, function (evt) {
                inputMap[evt.sourceEvent.key] = evt.sourceEvent.type == "keydown";
            }));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, function (evt) {
                inputMap[evt.sourceEvent.key] = evt.sourceEvent.type == "keydown";
            }));

            // 6. حلقة التحديث (Game Loop)
            scene.onBeforeRenderObservable.add(() => {
                let keydown = false;
                if (inputMap["w"] || inputMap["ArrowUp"]) {
                    player.moveWithCollisions(player.forward.scaleInPlace(0.1));
                    keydown = true;
                }
                if (inputMap["s"] || inputMap["ArrowDown"]) {
                    player.moveWithCollisions(player.forward.scaleInPlace(-0.1));
                    keydown = true;
                }
                if (inputMap["a"] || inputMap["ArrowLeft"]) {
                    player.rotate(BABYLON.Vector3.Up(), -0.1);
                    keydown = true;
                }
                if (inputMap["d"] || inputMap["ArrowRight"]) {
                    player.rotate(BABYLON.Vector3.Up(), 0.1);
                    keydown = true;
                }
            });

            return scene;
        };

        createScene().then(scene => {
            engine.runRenderLoop(function () {
                scene.render();
            });
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
