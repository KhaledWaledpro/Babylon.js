<!DOCTYPE html>
<html>
<head>
    <title>Ancient Warrior - Production</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
        #loader { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: Arial; text-align: center; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loader">جاري تحميل عالم المحارب...<br>تأكد من اتصالك بالإنترنت</div>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        const loader = document.getElementById("loader");

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.1, 0.1, 0.1); // خلفية غامقة بدل الأبيض

            // كاميرا احتياطية في البداية
            const camera = new BABYLON.ArcRotateCamera("camera", 0, 0.8, 15, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);

            // إنشاء أرضية بسيطة فوراً (عشان لو الموديلات اتأخرت متشوفش شاشة فاضية)
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 100, height: 100}, scene);
            const groundMat = new BABYLON.StandardMaterial("gMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.2, 0.3, 0.2);
            ground.material = groundMat;

            try {
                // تحميل المحارب والأشجار
                console.log("Starting assets load...");
                
                // تحميل المحارب
                const warriorResult = await BABYLON.SceneLoader.ImportMeshAsync("", "https://assets.babylonjs.com/meshes/", "Knight.glb", scene);
                const warrior = warriorResult.meshes[0];
                warrior.scaling.setAll(0.05);
                camera.lockedTarget = warrior;

                // تحميل شجرة واحدة وعمل غابة
                const treeResult = await BABYLON.SceneLoader.ImportMeshAsync("", "https://assets.babylonjs.com/meshes/", "Tree.glb", scene);
                const baseTree = treeResult.meshes[0];
                baseTree.isVisible = false;
                for (let i = 0; i < 20; i++) {
                    const t = baseTree.clone("t"+i);
                    t.position.set(Math.random()*60-30, 0, Math.random()*60-30);
                }

                loader.style.display = "none"; // إخفاء كلمة تحميل
                console.log("Load complete!");

                // دعم اللمس للموبايل (Joystick)
                const adt = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI("UI");
                const leftThumbContainer = new BABYLON.GUI.Ellipse();
                leftThumbContainer.width = "120px";
                leftThumbContainer.height = "120px";
                leftThumbContainer.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
                leftThumbContainer.verticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_BOTTOM;
                leftThumbContainer.left = "50px";
                leftThumbContainer.bottom = "50px";
                leftThumbContainer.background = "rgba(255,255,255,0.2)";
                adt.addControl(leftThumbContainer);

                // منطق الحركة
                const inputMap = {};
                window.addEventListener("keydown", (e) => inputMap[e.key.toLowerCase()] = true);
                window.addEventListener("keyup", (e) => inputMap[e.key.toLowerCase()] = false);

                scene.onBeforeRenderObservable.add(() => {
                    let move = BABYLON.Vector3.Zero();
                    if (inputMap["w"]) move.z = 0.15;
                    if (inputMap["s"]) move.z = -0.15;
                    if (inputMap["a"]) warrior.rotation.y -= 0.05;
                    if (inputMap["d"]) warrior.rotation.y += 0.05;
                    
                    warrior.moveWithCollisions(warrior.forward.scale(move.z));
                });

            } catch (e) {
                console.error("خطأ في التحميل: ", e);
                loader.innerHTML = "حدث خطأ أثناء تحميل الملفات. راجع الـ Console.";
            }

            return scene;
        };

        createScene().then(scene => {
            engine.runRenderLoop(() => scene.render());
        });

        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
