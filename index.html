<!DOCTYPE html>
<html>
<head>
    <title>Ancient Warrior - Mobile Ready</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.5, 0.8, 1); // سماء زرقاء

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            
            // الكاميرا
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 15, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);

            // أرضية مرسومة بالكود
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 100, height: 100}, scene);
            const groundMat = new BABYLON.StandardMaterial("gMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.2, 0.5, 0.2);
            ground.material = groundMat;

            // بناء "محارب" بسيط من المكعبات (عشان يشتغل 100%)
            const warrior = BABYLON.MeshBuilder.CreateBox("body", {height: 2, width: 1, depth: 0.5}, scene);
            warrior.position.y = 1;
            const warriorMat = new BABYLON.StandardMaterial("wMat", scene);
            warriorMat.diffuseColor = new BABYLON.Color3(0.7, 0.7, 0.7); // لون درع فضي
            warrior.material = warriorMat;

            // إضافة "سيف" للمحارب
            const sword = BABYLON.MeshBuilder.CreateBox("sword", {height: 2, width: 0.1, depth: 0.2}, scene);
            sword.parent = warrior;
            sword.position.set(0.6, 0.5, 0.5);
            sword.rotation.x = Math.PI / 3;

            camera.lockedTarget = warrior;

            // إضافة "أشجار" (أسطوانة + كرة) بالكود
            for (let i = 0; i < 20; i++) {
                let trunk = BABYLON.MeshBuilder.CreateCylinder("t", {height: 2, diameter: 0.5}, scene);
                let leaves = BABYLON.MeshBuilder.CreateSphere("l", {diameter: 3}, scene);
                leaves.parent = trunk;
                leaves.position.y = 2;
                trunk.position.set(Math.random()*80-40, 1, Math.random()*80-40);
            }

            // --- التحكم للموبايل (GUI) ---
            const adt = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI("UI");
            const joystick = new BABYLON.GUI.Ellipse();
            joystick.width = "100px"; joystick.height = "100px";
            joystick.color = "white"; joystick.thickness = 4;
            joystick.background = "rgba(0,0,0,0.3)";
            joystick.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
            joystick.verticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_BOTTOM;
            joystick.left = "50px"; joystick.bottom = "50px";
            adt.addControl(joystick);

            // منطق الحركة
            let moveVector = new BABYLON.Vector3(0, 0, 0);
            const inputMap = {};
            window.addEventListener("keydown", (e) => inputMap[e.key.toLowerCase()] = true);
            window.addEventListener("keyup", (e) => inputMap[e.key.toLowerCase()] = false);

            scene.onBeforeRenderObservable.add(() => {
                let speed = 0.2;
                if (inputMap["w"]) warrior.moveWithCollisions(warrior.forward.scale(speed));
                if (inputMap["s"]) warrior.moveWithCollisions(warrior.forward.scale(-speed));
                if (inputMap["a"]) warrior.rotation.y -= 0.05;
                if (inputMap["d"]) warrior.rotation.y += 0.05;
            });

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
